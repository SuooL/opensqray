<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenSqray API demo</title>
  <desc id="desc">Synthetic visual summary of OpenSqray native and SDK-backed SDPC workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="tissue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7b7c9"/>
      <stop offset="55%" stop-color="#d780a6"/>
      <stop offset="100%" stop-color="#7ec7bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="0" fill="url(#bg)"/>

  <text x="56" y="64" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">OpenSqray SDPC API demo</text>
  <text x="56" y="98" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Native parser for public-safe research, optional SDK backend for coordinate tile and region reads.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="132" width="486" height="514" rx="18" fill="#ffffff"/>
  </g>
  <text x="88" y="178" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Slide pyramid and tile workflow</text>
  <text x="88" y="204" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Synthetic visual only. No local sample pixels are embedded.</text>

  <g transform="translate(88 232)">
    <rect x="0" y="0" width="386" height="276" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="24" y="24" width="266" height="174" rx="10" fill="url(#tissue)" opacity="0.92"/>
    <path d="M60 52 C105 14 155 70 198 38 C248 2 292 70 276 122 C256 188 178 165 136 190 C92 216 32 165 42 104 C45 82 48 66 60 52 Z" fill="#ffffff" opacity="0.23"/>
    <path d="M94 86 C130 58 155 104 185 90 C220 74 254 112 238 148 C222 184 174 162 148 178 C116 198 76 164 82 126 C84 108 84 96 94 86 Z" fill="#5b8f87" opacity="0.25"/>
    <g stroke="#ffffff" stroke-opacity="0.72" stroke-width="1">
      <path d="M24 66 H290"/>
      <path d="M24 108 H290"/>
      <path d="M24 150 H290"/>
      <path d="M70 24 V198"/>
      <path d="M116 24 V198"/>
      <path d="M162 24 V198"/>
      <path d="M208 24 V198"/>
      <path d="M254 24 V198"/>
    </g>
    <rect x="24" y="24" width="46" height="42" fill="none" stroke="#f97316" stroke-width="4"/>
    <rect x="318" y="72" width="44" height="30" rx="3" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="318" y="122" width="34" height="23" rx="3" fill="#ccfbf1" stroke="#2dd4bf"/>
    <rect x="318" y="160" width="24" height="16" rx="3" fill="#fee2e2" stroke="#fb7185"/>
    <text x="318" y="57" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">levels</text>
    <text x="0" y="236" font-family="Menlo, Consolas, monospace" font-size="13" fill="#334155">tile_size = 544 x 448</text>
    <text x="0" y="258" font-family="Menlo, Consolas, monospace" font-size="13" fill="#334155">level0_grid = 92 x 208</text>
  </g>

  <g transform="translate(88 552)">
    <rect x="0" y="0" width="386" height="56" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <circle cx="28" cy="28" r="8" fill="#f97316"/>
    <text x="48" y="23" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Native backend</text>
    <text x="48" y="42" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Metadata, candidates, preview JPEG bytes; no native read_region yet.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="586" y="132" width="558" height="514" rx="18" fill="#0f172a"/>
  </g>
  <text x="622" y="178" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Observed SDK-backed command shape</text>
  <text x="622" y="204" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">The numeric geometry below comes from one local ignored SDPC smoke run.</text>

  <g font-family="Menlo, Consolas, monospace" font-size="14">
    <text x="622" y="246" fill="#7dd3fc">$ opensqray sdk-info slide.sdpc --compact</text>
    <text x="622" y="278" fill="#e2e8f0">{</text>
    <text x="646" y="304" fill="#e2e8f0">"backend": "sqray_sdk",</text>
    <text x="646" y="330" fill="#e2e8f0">"tile_size": {"width": 544, "height": 448},</text>
    <text x="646" y="356" fill="#e2e8f0">"level_count": 7,</text>
    <text x="646" y="382" fill="#e2e8f0">"level0_grid": {"columns": 92, "rows": 208}</text>
    <text x="622" y="408" fill="#e2e8f0">}</text>

    <text x="622" y="456" fill="#7dd3fc">$ opensqray read-tile slide.sdpc --backend sdk ...</text>
    <text x="622" y="488" fill="#e2e8f0">{"backend":"sdk","byte_length":19805,</text>
    <text x="622" y="514" fill="#e2e8f0"> "content_type":"image/jpeg"}</text>

    <text x="622" y="562" fill="#7dd3fc">with SDPCSlide("slide.sdpc", backend="sdk") as slide:</text>
    <text x="646" y="588" fill="#e2e8f0">region = slide.read_region((0, 0), 0, (512, 512))</text>
  </g>

  <g transform="translate(586 666)">
    <rect x="0" y="-26" width="558" height="38" rx="10" fill="#134e4a"/>
    <text x="20" y="-2" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ccfbf1">SDK backend: practical tile/region reads, not full OpenSlide API parity.</text>
  </g>
</svg>
